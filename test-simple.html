<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>元素定位器测试页面</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { color: #333; margin-bottom: 20px; }
    .btn {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      background: #1a1a1a;
      color: white;
    }
    .btn:hover { background: #333; }
    .alert {
      background: #fef3cd;
      border: 1px solid #ffc107;
      padding: 12px;
      border-radius: 6px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>元素定位器测试页面</h1>

    <div class="alert">
      <strong>测试步骤：</strong>
      <ol>
        <li>打开浏览器控制台（F12）</li>
        <li>检查是否有 "Element Locator" 开头的日志</li>
        <li>检查页面右下角是否有悬浮按钮</li>
        <li>如果没有，请在扩展管理页面重新加载插件</li>
      </ol>
    </div>

    <button class="btn" id="testBtn">测试按钮 1</button>
    <button class="btn" id="testBtn2">测试按钮 2</button>
  </div>

  <script>
    console.log('测试页面：页面脚本已加载');

    document.getElementById('testBtn').addEventListener('click', function() {
      console.log('测试按钮 1 被点击');
    });
  </script>
</body>
</html>
