<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生成插件图标</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h1 {
      color: #667eea;
      margin-bottom: 20px;
    }
    .icon-preview {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      justify-content: center;
      align-items: center;
    }
    .icon-item {
      text-align: center;
    }
    canvas {
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      margin: 5px;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .instructions {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
      line-height: 1.6;
    }
    .instructions ol {
      padding-left: 20px;
    }
    .instructions li {
      margin-bottom: 8px;
    }
    code {
      background: #e9ecef;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 插件图标生成器</h1>

    <div class="icon-preview">
      <div class="icon-item">
        <canvas id="icon16" width="16" height="16"></canvas>
        <p>16x16</p>
      </div>
      <div class="icon-item">
        <canvas id="icon48" width="48" height="48"></canvas>
        <p>48x48</p>
      </div>
      <div class="icon-item">
        <canvas id="icon128" width="128" height="128"></canvas>
        <p>128x128</p>
      </div>
    </div>

    <div style="text-align: center;">
      <button onclick="downloadIcon(16)">下载 16x16</button>
      <button onclick="downloadIcon(48)">下载 48x48</button>
      <button onclick="downloadIcon(128)">下载 128x128</button>
      <button onclick="downloadAll()">下载全部</button>
    </div>

    <div class="instructions">
      <strong>使用说明：</strong>
      <ol>
        <li>点击上方按钮下载图标文件</li>
        <li>将下载的图标文件移动到插件目录 <code>element-locator/</code></li>
        <li>确保文件名为：
          <ul>
            <li><code>icon16.png</code></li>
            <li><code>icon48.png</code></li>
            <li><code>icon128.png</code></li>
          </ul>
        </li>
        <li>完成！现在可以加载插件到 Chrome</li>
      </ol>
    </div>
  </div>

  <script>
    // 绘制图标
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');

      // 背景渐变
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#667eea');
      gradient.addColorStop(1, '#764ba2');

      // 绘制背景圆
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2 - 1, 0, Math.PI * 2);
      ctx.fill();

      // 绘制靶心图标
      ctx.strokeStyle = 'white';
      ctx.lineWidth = size / 16;

      // 外圈
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/3, 0, Math.PI * 2);
      ctx.stroke();

      // 中圈
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/5, 0, Math.PI * 2);
      ctx.stroke();

      // 中心点
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/12, 0, Math.PI * 2);
      ctx.fill();
    }

    // 初始化绘制
    const sizes = [16, 48, 128];
    sizes.forEach(size => {
      const canvas = document.getElementById(`icon${size}`);
      drawIcon(canvas, size);
    });

    // 下载单个图标
    function downloadIcon(size) {
      const canvas = document.getElementById(`icon${size}`);
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // 下载全部图标
    function downloadAll() {
      sizes.forEach((size, index) => {
        setTimeout(() => {
          downloadIcon(size);
        }, index * 500);
      });
    }
  </script>
</body>
</html>
